<!DOCTYPE html>
<html lang="en">

<body class="light-mode">
<script>
(function(){
  var def = window.__THEME_DEFAULT__ || 'light';
  var k = window.__THEME_LS_KEY || 'theme';
  var ls = localStorage.getItem(k);
  var mode;
  if (ls === 'light' || ls === 'dark') {
    mode = ls;
  } else {
    if (def === 'system') {
      mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    } else {
      mode = def === 'dark' ? 'dark' : 'light';
    }
    localStorage.setItem(k, mode);
  }
  document.body.classList.remove('light-mode','dark-mode');
  document.body.classList.add(mode === 'dark' ? 'dark-mode' : 'light-mode');
})();
</script>
